    <style>
      :root{--bg:#110e0c;--text:#f5efe6;--brand:#d42c2c;--brand-2:#e8b230;--muted:#c4b5a4}*{box-sizing:border-box;margin:0;padding:0}html,body,#root{height:100%}body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:radial-gradient(ellipse 1400px 600px at 30% -5%,#2a1a14 0%,transparent 70%),radial-gradient(ellipse 800px 600px at 80% 100%,#1a1210 0%,transparent 70%),var(--bg)}.container{width:min(1200px,92%);margin-inline:auto}header.site{position:sticky;top:0;z-index:50;background:#110e0cd9;backdrop-filter:blur(12px);border-bottom:1px solid #ffffff10}.hero{padding:4rem 0 3rem}.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,5vw,4rem);line-height:1.05;margin:0}
